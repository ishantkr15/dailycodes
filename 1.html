<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Access Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="bg-blob blob-1"></div><div class="bg-blob blob-2"></div>
<div class="toast" id="toast">✅ Code copied!</div>
<div class="container">
    <header>
        <span class="lock-icon">🔐</span>
        <h1>Your Access Code</h1>
        <p class="subtitle">Copy the code below and enter it in the app</p>
    </header>
    <div class="card code-card">
        <div class="label">Access Code</div>
        <div class="code" id="code">XKJN7R3M</div>
        <button class="btn-copy" onclick="copyCode()">📋 Tap to Copy</button>
    </div>
    <div class="card info-card">
        <div class="info-row"><span>🔑</span><span>Enter this code in the app to unlock content</span></div>
        <div class="info-row"><span>⏰</span><span>This code is valid for today only</span></div>
    </div>
    <div class="countdown-card">
        <div class="countdown-label">⏱ Code expires in</div>
        <div class="countdown" id="countdown">--:--:--</div>
    </div>
    <footer><a href="https://instagram.com/asmultiverse.in">@asmultiverse.in</a></footer>
</div>
<script>
function copyCode(){navigator.clipboard.writeText(document.getElementById('code').textContent).then(()=>{const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)})}
function tick(){const n=new Date(),m=new Date(n);m.setUTCHours(24,0,0,0);const d=m-n,h=Math.floor(d/36e5),mi=Math.floor(d%36e5/6e4),s=Math.floor(d%6e4/1e3);document.getElementById('countdown').textContent=String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':'+String(s).padStart(2,'0')}
tick();setInterval(tick,1000);
</script>
</body>
</html>
